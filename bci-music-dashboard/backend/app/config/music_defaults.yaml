system_modes:
  MIRROR:
    smoothing: 0.25
    emotion_mappings:
      calm:
        tempo: 68
        density: 0.25
        velocity: 0.35
        register: mid_high
        scale: major_pentatonic
        mode: soft
        instruments: {xylophone: 0.45, pad: 0.35, bass: 0.2}
        reverb: 0.68
        delay: 0.22
        rhythm_complexity: 0.2
        brightness: 0.62
        tension: 0.06
      joy:
        tempo: 116
        density: 0.82
        velocity: 0.78
        register: high
        scale: bright_pentatonic
        mode: major
        instruments: {xylophone: 0.5, pad: 0.2, drum: 0.2, cymbal: 0.1}
        reverb: 0.45
        delay: 0.18
        rhythm_complexity: 0.62
        brightness: 0.9
        tension: 0.12
      neutral:
        tempo: 88
        density: 0.5
        velocity: 0.52
        register: mid
        scale: gong
        mode: stable
        instruments: {xylophone: 0.45, pad: 0.25, bass: 0.2, drum: 0.1}
        reverb: 0.32
        delay: 0.1
        rhythm_complexity: 0.35
        brightness: 0.52
        tension: 0.1
      sad:
        tempo: 62
        density: 0.22
        velocity: 0.32
        register: low
        scale: yu
        mode: dark_pentatonic
        instruments: {xylophone: 0.28, pad: 0.42, bass: 0.3}
        reverb: 0.72
        delay: 0.24
        rhythm_complexity: 0.18
        brightness: 0.28
        tension: 0.32
      tense:
        tempo: 126
        density: 0.76
        velocity: 0.74
        register: wide
        scale: jue
        mode: controlled_tension
        instruments: {xylophone: 0.38, bass: 0.22, drum: 0.28, cymbal: 0.12}
        reverb: 0.26
        delay: 0.36
        rhythm_complexity: 0.82
        brightness: 0.48
        tension: 0.78
  ENGAGING:
    duration_sec: 240
    smoothing: 0.18
    target_state: {valence: 0.85, arousal: 0.65, tension: 0.2, agency: 0.8}
    stages:
      - {name: Resonance, start: 0, end: 40}
      - {name: Regulation, start: 40, end: 90}
      - {name: Activation, start: 90, end: 150}
      - {name: Elevation, start: 150, end: 220}
      - {name: Integration, start: 220, end: 240}
    initial_emotion_paths:
      tense: [grounding, release, joy_calm]
      sad: [warmth, movement, uplift]
      neutral: [curiosity, joy, elevation]
      calm: [openness, gentle_joy]
      joy: [collective_elevation, integrated_calm]
music_parameter_schema:
  pitch_range: {type: int_range, min: 0, max: 127, editable: true}
  velocity_range: {type: int_range, min: 0, max: 127, editable: true}
  bpm: {type: int_or_auto, min: 30, max: 220, editable: true}
  density: {type: float, min: 0.0, max: 1.0, editable: true}
  polyphony: {type: int, min: 1, max: 8, editable: true}
  arpeggio_density: {type: float, min: 0.0, max: 1.0, editable: true}
  arpeggio_max_group_notes: {type: int, min: 2, max: 5, editable: true}
  arpeggio_notochord_rate: {type: float, min: 0.0, max: 0.5, editable: true}
  delay_ms: {type: int, min: 0, max: 5000, editable: true}
  note_length_ms: {type: int, min: 20, max: 10000, editable: true}
  humanize: {type: float, min: 0.0, max: 1.0, editable: true}
  mapping_weight: {type: float, min: -1.0, max: 1.0, editable: true}
