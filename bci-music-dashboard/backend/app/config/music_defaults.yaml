global:
  bpm:
    default: 96
    min: 30
    max: 220
    editable: true
  root_note:
    default: C
    options: [C, C#, D, D#, E, F, F#, G, G#, A, A#, B]
    editable: true
  scale:
    default: auto
    options: [auto, major, minor, pentatonic, chromatic, dorian, lydian, phrygian, gong, shang, jue, zhi, yu]
    editable: true
  quantization:
    default: 1/8
    options: ["1/1", "1/2", "1/4", "1/8", "1/16", "free"]
    editable: true
  swing: {default: 0.0, min: 0.0, max: 0.7, editable: true}
  humanize: {default: 0.12, min: 0.0, max: 1.0, editable: true}
  master_velocity: {default: 0.8, min: 0.0, max: 1.0, editable: true}
  master_density: {default: 0.6, min: 0.0, max: 1.0, editable: true}
  output_mode:
    default: osc
    options: [osc, midi, both, mock]
    editable: true
emotion_profiles:
  joy:
    label_zh: 高兴
    scale: gong
    bpm_range: [100, 140]
    pitch_range: [60, 88]
    velocity_range: [60, 115]
    density_range: [0.55, 0.95]
    delay_ms_range: [60, 250]
    chord_quality: major
    brightness: 0.9
    tension: 0.15
    editable: true
  calm:
    label_zh: 平静
    scale: gong
    bpm_range: [55, 90]
    pitch_range: [48, 76]
    velocity_range: [25, 70]
    density_range: [0.10, 0.45]
    delay_ms_range: [300, 1000]
    chord_quality: open_fifth
    brightness: 0.65
    tension: 0.05
    editable: true
  neutral:
    label_zh: 中性
    scale: shang
    bpm_range: [75, 110]
    pitch_range: [52, 80]
    velocity_range: [40, 85]
    density_range: [0.30, 0.65]
    delay_ms_range: [150, 600]
    chord_quality: triad
    brightness: 0.5
    tension: 0.1
    editable: true
  tense:
    label_zh: 紧张
    scale: jue
    bpm_range: [110, 165]
    pitch_range: [55, 92]
    velocity_range: [70, 125]
    density_range: [0.70, 1.0]
    delay_ms_range: [30, 200]
    chord_quality: diminished
    brightness: 0.45
    tension: 0.85
    editable: true
  sad:
    label_zh: 悲伤
    scale: yu
    bpm_range: [40, 75]
    pitch_range: [36, 68]
    velocity_range: [20, 65]
    density_range: [0.08, 0.38]
    delay_ms_range: [500, 1600]
    chord_quality: minor
    brightness: 0.25
    tension: 0.35
    editable: true
default_tracks:
  - id: piano_melody_01
    name: Xylophone Melody
    enabled: true
    compute_enabled: true
    role: melody
    instrument: xylophone
    output_type: osc
    target_ip: 127.0.0.1
    target_port: 57120
    midi_channel: 1
    midi_program: 0
    root_note: auto
    scale: auto
    pitch_range: [48, 84]
    velocity_range: [35, 105]
    bpm: auto
    density: 0.6
    polyphony: 3
    voicing_enabled: true
    voicing_density: 0.55
    notochord_revoice_rate: 0.25
    arpeggio_enabled: true
    arpeggio_density: 0.45
    arpeggio_rate: "1/8"
    arpeggio_max_group_notes: 5
    arpeggio_notochord_rate: 0.2
    delay_ms: 125
    note_length_ms: 300
    humanize: 0.12
    editable_params: [enabled, compute_enabled, instrument, output_type, target_ip, target_port, midi_channel, root_note, scale, pitch_range, velocity_range, bpm, density, polyphony, voicing_enabled, voicing_density, notochord_revoice_rate, arpeggio_enabled, arpeggio_density, arpeggio_rate, arpeggio_max_group_notes, arpeggio_notochord_rate, delay_ms, note_length_ms, humanize, mapping]
